services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build: ./backend
    restart: unless-stopped
    env_file: .env
    environment:
      MONGO_URL: mongodb://mongo:27017
    depends_on:
      mongo:
        condition: service_healthy
    expose:
      - "8000"

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    depends_on:
      - api

volumes:
  mongo_data:
